<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <!-- Background -->
  <rect width="600" height="220" fill="#1c2a3a"/>
  <!-- Gold top border accent -->
  <rect width="600" height="3" fill="#c9a84c"/>
  <!-- Bottom subtle gradient band -->
  <rect y="180" width="600" height="40" fill="#162030" opacity="0.5"/>

  <!-- Shield icon centered -->
  <g transform="translate(272, 28)">
    <!-- Shield outer -->
    <path d="M28 0 L56 10 L56 36 Q56 58 28 72 Q0 58 0 36 L0 10 Z" fill="#c9a84c" opacity="0.85"/>
    <!-- Shield inner dark -->
    <path d="M28 6 L50 15 L50 36 Q50 55 28 67 Q6 55 6 36 L6 15 Z" fill="#1c2a3a"/>
    <!-- Helmet visor lines -->
    <rect x="15" y="27" width="26" height="3" rx="1.5" fill="#c9a84c" opacity="0.85"/>
    <rect x="18" y="34" width="20" height="2.5" rx="1.25" fill="#c9a84c" opacity="0.6"/>
    <rect x="21" y="40" width="14" height="2" rx="1" fill="#c9a84c" opacity="0.4"/>
    <!-- Crest top knob -->
    <rect x="25" y="-6" width="6" height="8" rx="3" fill="#c9a84c" opacity="0.7"/>
  </g>

  <!-- VANGUARD text -->
  <text x="300" y="122" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" letter-spacing="6" fill="#c9a84c" text-anchor="middle">VANGUARD</text>
  <!-- REALTY GROUP text -->
  <text x="300" y="143" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="400" letter-spacing="5" fill="#6a7f9a" text-anchor="middle">REALTY GROUP</text>

  <!-- Divider -->
  <line x1="200" y1="160" x2="400" y2="160" stroke="#c9a84c" stroke-width="0.75" opacity="0.35"/>

  <!-- CTA text -->
  <text x="300" y="183" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11.5" font-weight="500" letter-spacing="2" fill="#8a9ab5" text-anchor="middle">VIEW PHOTOS ON CREXI  →</text>
</svg>
